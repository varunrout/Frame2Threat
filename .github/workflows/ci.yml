name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Lint, Type Check, Test, and Build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . --no-deps
          python -m pip install \
            black \
            joblib \
            lightgbm \
            mypy \
            networkx \
            numpy \
            pandas \
            pyarrow \
            pytest \
            pytest-cov \
            pyyaml \
            ruff \
            scikit-learn \
            scipy \
            xgboost

      - name: Lint
        run: ruff check src tests scripts --select E9,F63,F7

      - name: Format check
        continue-on-error: true
        run: black --check src tests

      - name: Type check
        continue-on-error: true
        run: mypy src

      - name: Tests with coverage
        run: pytest --cov=src --cov-report=term-missing --cov-fail-under=24

      - name: Store smoke
        run: python -m src.data.build_store --synthetic --output-dir data/store/smoke

      - name: Reproduce smoke
        run: python scripts/run_pipeline.py --smoke --synthetic --output-dir data/repro/v1_smoke

      - name: Build package
        run: python -m pip install --no-deps .
