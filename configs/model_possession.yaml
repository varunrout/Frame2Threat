# Frame2Threat v2/v3 — Possession-level XGBoost configuration
# Centralises hyperparameters previously hard-coded in notebooks.
#
# Loaded by:
#   - notebooks/07_possession_baseline.ipynb  (v2 main XGBoost)
#   - notebooks/08_possession_sequence_model.ipynb  (v2 ablation models)
#   - notebooks/10_early_prediction.ipynb  (v3 early-prediction XGBoost)

# ── v2 main possession XGBoost (EXP-009, NB07) ──────────────────────────────
xgboost_main:
  n_estimators: 500
  max_depth: 5
  learning_rate: 0.05
  subsample: 0.8
  colsample_bytree: 0.8
  eval_metric: aucpr
  early_stopping_rounds: 30
  random_state: 42
  n_jobs: -1

# ── v2 ablation: origin-type only (EXP-012, NB08) ───────────────────────────
xgboost_ablation_origin:
  n_estimators: 200
  max_depth: 4
  learning_rate: 0.1
  random_state: 42
  n_jobs: -1

# ── v2 ablation: spatial/temporal, no origin (NB08) ─────────────────────────
xgboost_ablation_no_origin:
  n_estimators: 300
  max_depth: 5
  learning_rate: 0.05
  random_state: 42
  n_jobs: -1

# ── v3 early-prediction XGBoost (EXP-015/017, NB10) ─────────────────────────
xgboost_early:
  n_estimators: 300
  max_depth: 4
  learning_rate: 0.05
  subsample: 0.9
  colsample_bytree: 0.9
  min_child_weight: 2
  reg_lambda: 1.0
  eval_metric: auc
  random_state: 42
  n_jobs: 0

# ── v3 early-warning pipeline (CLI / inference) ─────────────────────────────
early_warning:
  fractions: [0.25, 0.50, 0.75, 1.00]
  alert_threshold: 0.50
  min_events: 3
  gru_model: models/gru_poss_dangerous.pt
  start_model: models/xgboost_start_only.joblib
  xgb_model_pattern: "models/xgboost_cumulative_{pct}pct.joblib"
